<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷表</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e9eef2;
}

.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns: 1fr 2fr;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* 左側 */
.left{
    background:#eef2f5;
    padding:30px;
}

.profile-img{
    width:100%;
    border-radius:10px;
}

.section{
    margin-top:30px;
}

.section h2{
    color:#7aa6b1;
    margin-bottom:10px;
}

.section p{
    font-size:14px;
    margin-bottom:5px;
}

.skills li{
    margin-bottom:6px;
}

/* 右側 */
.right{
    padding:40px;
}

.name{
    font-size:40px;
    color:#7aa6b1;
    font-weight:bold;
}

.title{
    font-size:20px;
    margin-bottom:20px;
}

.contact p{
    font-size:14px;
    margin-bottom:5px;
}

.work{
    margin-top:30px;
}

.work h2{
    color:#7aa6b1;
    margin-bottom:15px;
}

.job{
    margin-bottom:20px;
}

.job h3{
    font-size:16px;
}

.job p{
    font-size:14px;
}

.job ul{
    margin-left:20px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <!-- 左側 -->
    <div class="left">
        <img src="images/photo.jpg" class="profile-img">

        <div class="section">
            <h2>學歷</h2>
            <p><strong>亞洲大學</strong></p>
            <p>學士（在學中）</p>
        </div>

        <div class="section">
            <h2>技能</h2>
            <ul class="skills">
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>Python</li>
                <li>C++</li>
            </ul>
        </div>
    </div>

    <!-- 右側 -->
    <div class="right">
        <div class="name">你的名字</div>
        <div class="title">學生 / 開發者</div>

        <div class="contact">
            <p>📞 0912-345-678</p>
            <p>📧 your_email@example.com</p>
            <p>🌐 github.com/yourname</p>
        </div>

        <div class="work">
            <h2>專案經驗</h2>

            <div class="job">
                <h3>個人網站</h3>
                <p>使用 HTML / CSS / JS 製作</p>
                <ul>
                    <li>設計前端版面</li>
                    <li>實作互動效果</li>
                </ul>
            </div>

            <div class="job">
                <h3>課程專案</h3>
                <p>完成多個系統開發</p>
                <ul>
                    <li>資料結構應用</li>
                    <li>演算法實作</li>
                </ul>
            </div>

        </div>
    </div>

</div>

</body>
</html>
